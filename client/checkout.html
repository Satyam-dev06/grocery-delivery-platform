<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout - GroceryHub</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">🛒 GroceryHub</div>
    <button onclick="window.location.href='cart.html'">← Back to Cart</button>
  </nav>
</header>

<main>
  <section class="checkout">
    <h2>📋 Checkout</h2>

    <form id="checkoutForm">

      <!-- Saved Addresses -->
      <div id="savedAddressesSection">
        <label>📍 Select Delivery Address</label>
        <div id="savedAddressList">
          <p style="color:#999;padding:20px;">Loading addresses...</p>
        </div>
        <p><a href="address.html" style="color:#2E7D32;font-weight:bold;">+ Add / Manage Addresses</a></p>
      </div>

      <hr style="margin:15px 0;border-color:#eee;">

      <!-- Payment Method -->
      <label for="payment">💳 Payment Method</label>
      <select id="payment" required>
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="UPI">UPI</option>
        <option value="Card">Card</option>
      </select>

      <!-- Order Summary -->
      <div class="order-summary">
        <h3>Order Summary</h3>
        <p>Products Total: ₹<span id="summaryTotal">0</span></p>
        <h2 style="margin-top:15px;">Grand Total: ₹<span id="grandTotal">0</span></h2>
      </div>

      <!-- Message Area -->
      <p id="checkoutMessage" style="text-align:center;font-weight:bold;min-height:24px;"></p>

      <!-- Submit Button with Loading Spinner -->
      <button class="shop-btn" type="submit" id="placeOrderBtn" style="display:flex;align-items:center;justify-content:center;gap:10px;">
        <span id="btnText">Place Order</span>
        <span id="btnSpinner" style="display:none;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;"></span>
      </button>

    </form>
  </section>
</main>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="./js/api.js"></script>
<script src="./js/checkout.js"></script>

</body>
</html>
