<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Checkout</title>

<link rel="stylesheet"
href="./css/style.css">

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">

🛒 GroceryHub

</div>

<button
onclick="window.location.href='cart.html'">

← Back to Cart

</button>

</nav>

</header>

<main>

<section class="checkout">

<h2>Checkout</h2>

<form id="checkoutForm">

<label for="name">Full Name</label>

<input
type="text"
id="name"
autocomplete="name"
required>

<label for="phone">Phone Number</label>

<input
type="tel"
id="phone"
autocomplete="tel"
required>

<label for="address">Delivery Address</label>

<textarea
id="address"
autocomplete="street-address"
required></textarea>

<label for="slot">Delivery Slot</label>

<select id="slot">

<option>9 AM - 11 AM</option>

<option>11 AM - 1 PM</option>

<option>2 PM - 4 PM</option>

<option>5 PM - 7 PM</option>

</select>

<label class="express-label">

<input type="checkbox" id="express">

🚀 Express Delivery (₹49) — Delivered within 1 Hour

</label>

<label for="coupon">

Coupon Code

</label>

<input

type="text"

id="coupon"

placeholder="SAVE20"

autocomplete="off">

<button

type="button"

id="applyCoupon">

Apply Coupon

</button>

<p id="couponMessage"></p>

<label for="payment">Payment Method</label>

<select id="payment">

<option>Cash on Delivery</option>

<option>UPI</option>

<option>Debit Card</option>

<option>Credit Card</option>

</select>

<button
class="shop-btn"
type="submit">

Place Order

</button>

</form>

<div class="order-summary">

    <h3>Order Summary</h3>

    <p>
        Products Total :
        ₹<span id="summaryTotal">0</span>
    </p>

    <p>
        Delivery :
        ₹<span id="deliveryFee">25</span>
    </p>

    <p>
        Discount :
        ₹<span id="discountAmount">0</span>
    </p>

    <h2>
        Grand Total :
        ₹<span id="grandTotal">0</span>
    </h2>

</div>

</section>

</main>

<script src="./js/checkout.js"></script>

</body>

</html>
