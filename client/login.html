<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GroceryHub</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">GroceryHub</div>
    <button onclick="window.location.href='index.html'">Home</button>
  </nav>
</header>

<main>
  <section class="auth-page">
    <div class="auth-card">
      <h2>Welcome to GroceryHub</h2>

      <div class="auth-tabs">
        <button id="loginTab" class="auth-tab active">Login</button>
        <button id="registerTab" class="auth-tab">Register</button>
      </div>

      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required>

        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" required>

        <button type="submit" class="shop-btn">Login</button>
        <p id="loginMessage"></p>
      </form>

      <form id="registerForm" style="display:none">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" placeholder="Your name" required>

        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required>

        <label for="regPassword">Password (6+ characters)</label>
        <input type="password" id="regPassword" placeholder="Create a password" required>

        <label for="regPhone">Phone Number</label>
        <input type="tel" id="regPhone" placeholder="+91 9876543210">

        <label for="regAddress">Delivery Address</label>
        <textarea id="regAddress" placeholder="Your address"></textarea>

        <button type="submit" class="shop-btn">Create Account</button>
        <p id="regMessage"></p>
      </form>
    </div>
  </section>
</main>

<script src="./js/api.js"></script>
<script src="./js/login.js"></script>
</body>
</html>
