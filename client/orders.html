<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - GroceryHub</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">🛒 GroceryHub</div>
    <div class="nav-actions">
      <button onclick="window.location.href='index.html'">🏠 Home</button>
      <button onclick="window.location.href='cart.html'">🛒 Cart</button>
      <button class="login-btn" onclick="window.location.href='login.html'">Login</button>
    </div>
  </nav>
</header>

<main>
  <section class="orders-page">
    <h2>📦 My Orders</h2>
    <div id="ordersContainer">
      <div class="loading-spinner" style="text-align:center;padding:60px;">
        <div style="width:40px;height:40px;border:4px solid #ddd;border-top-color:#2E7D32;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 20px;"></div>
        <p style="color:#999;">Loading orders...</p>
      </div>
    </div>
  </section>
</main>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="./js/api.js"></script>
<script src="./js/orders.js"></script>

</body>
</html>
